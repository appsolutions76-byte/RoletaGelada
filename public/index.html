<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roleta Gelada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        
        .prize-card {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prize-card:hover { background: #475569; }
        .prize-name { font-weight: bold; font-size: 18px; margin: 0; text-align: left; }
        .prize-price { color: #38bdf8; font-weight: bold; font-size: 16px; margin: 0; }
        
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #16a34a; color: white; margin-top: 20px; }
        
        .hidden { display: none !important; }
        #qr-container { display: flex; justify-content: center; margin: 20px 0; background: white; padding: 10px; border-radius: 10px; width: fit-content; margin-left: auto; margin-right: auto; }
        
        /* Roleta Simples */
        .roleta-box { position: relative; margin: 30px auto; width: 250px; height: 250px; }
        .roleta-pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ef4444; z-index: 10;
        }
        .roleta-wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 5px solid #FFD700;
            background: conic-gradient(#111 0% 16.6%, #FFD700 16.6% 33.3%, #111 33.3% 50%, #FFD700 50% 66.6%, #111 66.6% 83.3%, #FFD700 83.3% 100%);
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .roleta-text { position: absolute; font-weight: bold; font-size: 18px; color: #FFF; text-shadow: 0 0 10px black; text-align: center; width: 80%; line-height: 1.2; }
        
        .error-msg { color: #ef4444; font-weight: bold; padding: 10px; border: 1px solid #ef4444; border-radius: 5px; background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Roleta Gelada</h1>
        <p class="subtitle" id="bar-name">Carregando...</p>

        <!-- Etapa 1: Lista -->
        <div id="step-list">
            <h2 style="font-size:18px; margin-bottom: 20px;">Escolha o Prêmio</h2>
            <div id="prizes-container">
                <p style="color:#94a3b8;">Buscando...</p>
            </div>
        </div>

        <!-- Etapa 2: Pagar -->
        <div id="step-pay" class="hidden">
            <h2 style="font-size:22px; margin-bottom: 5px;">Aposta: R$ <span id="lbl-bet">0.00</span></h2>
            <p style="color:#94a3b8; margin-top:0;">Concorrendo a: <span id="lbl-prize"></span></p>
            
            <button class="btn-blue" id="btn-gerar-pix" onclick="generatePix()">Pagar com Pix</button>
            
            <div id="pix-area" class="hidden">
                <p style="color:#facc15; font-size: 14px; margin-top: 15px;">Aguardando pagamento...</p>
                <div id="qr-container"></div>
                <!-- Botão dinâmico será injetado aqui -->
            </div>
        </div>

        <!-- Etapa 3: Roleta -->
        <div id="step-spin" class="hidden">
            <div class="roleta-box">
                <div class="roleta-pointer"></div>
                <div class="roleta-wheel" id="wheel">
                    <span class="roleta-text" id="roleta-text-display">ROTAÇÃO</span>
                </div>
            </div>
            <button class="btn-blue" id="btn-girar" onclick="spinRoulette()" disabled>Sorteando...</button>
        </div>

        <!-- Etapa 4: Resultado -->
        <div id="step-result" class="hidden">
            <h2 id="result-title" style="font-size: 28px; color: #4ade80;">Parabéns!</h2>
            <p id="result-desc" style="color:#94a3b8;">Mostre este código no balcão.</p>
            <div id="result-qr-container" class="hidden"></div>
            <button class="btn-blue" onclick="location.reload()" style="background:transparent; border:2px solid #38bdf8; color:#38bdf8;">Jogar Novamente</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjupsdakdxexxcdkqfzf.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqdXBzZGFrZHhleHhjZGtxZnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjY2NDYsImV4cCI6MjA5NTI0MjY0Nn0.5XKPuhn34s-EUf6NXqNwpZysQoJVsyBIHQeVg4wnyyo';
        
        const params = new URLSearchParams(window.location.search);
        const BAR_ID = params.get('bar') || '11111111-1111-1111-1111-111111111111';

        let state = { prizeId: null, prizeName: null, roundId: null };

        // Função Genérica de Fetch (Substitui supabase-js)
        async function sfetch(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(`${SUPABASE_URL}${endpoint}`, options);
            if (!res.ok) {
                const err = await res.text();
                throw new Error(`Erro API: ${err || res.status}`);
            }
            const text = await res.text();
            try { return JSON.parse(text); } catch(e) { return text; }
        }

        async function init() {
            try {
                let barName = '';
                let prizes = [];

                if (BAR_ID === 'simulacao-123') {
                    // Modo Simulação
                    barName = 'Bar Parceiro (Modo Simulação)';
                    prizes = [
                        { id: 'sim-prize-1', name: 'Heineken 600ml', bet_amount: 5.00 },
                        { id: 'sim-prize-2', name: 'Porção de Fritas', bet_amount: 8.00 },
                        { id: 'sim-prize-3', name: 'Caipirinha', bet_amount: 10.00 }
                    ];
                    document.getElementById('bar-name').innerText = barName;
                } else {
                    // Busca o Bar real
                    const bars = await sfetch(`/rest/v1/bars?id=eq.${BAR_ID}&select=name`);
                    if(bars && bars.length > 0) document.getElementById('bar-name').innerText = bars[0].name;

                    // Busca prêmios reais
                    prizes = await sfetch(`/rest/v1/prizes?bar_id=eq.${BAR_ID}&active=eq.true&select=*`);
                }
                
                const container = document.getElementById('prizes-container');
                container.innerHTML = '';

                if (!prizes || prizes.length === 0) {
                    container.innerHTML = '<p>Nenhum prêmio disponível.</p>';
                    return;
                }

                prizes.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'prize-card';
                    div.innerHTML = `
                        <div><p class="prize-name">${p.name}</p></div>
                        <div><p class="prize-price">R$ ${p.bet_amount.toFixed(2)}</p></div>
                    `;
                    div.onclick = () => selectPrize(p.id, p.name, p.bet_amount);
                    container.appendChild(div);
                });

            } catch(e) {
                document.getElementById('prizes-container').innerHTML = `<p class="error-msg">${e.message}</p>`;
            }
        }

        function selectPrize(id, name, bet) {
            state.prizeId = id;
            state.prizeName = name;
            
            document.getElementById('step-list').classList.add('hidden');
            document.getElementById('step-pay').classList.remove('hidden');
            document.getElementById('lbl-prize').innerText = name;
            document.getElementById('lbl-bet').innerText = bet.toFixed(2);
        }

        async function generatePix() {
            const btn = document.getElementById('btn-gerar-pix');
            btn.disabled = true; btn.innerText = "Gerando...";

            if (BAR_ID === 'simulacao-123') {
                state.roundId = 'sim-round-123';
                btn.classList.add('hidden');
                document.getElementById('pix-area').classList.remove('hidden');
                document.getElementById('qr-container').innerHTML = '';
                new QRCode(document.getElementById('qr-container'), { text: "MOCK_QR_CODE", width: 150, height: 150 });

                const mockBtn = document.createElement('button');
                mockBtn.className = 'btn-green';
                mockBtn.innerText = 'Simular Pagamento (Teste)';
                mockBtn.onclick = () => {
                    mockBtn.innerText = 'Simulando...'; mockBtn.disabled = true;
                    startRoulette();
                };
                document.getElementById('pix-area').appendChild(mockBtn);
                return;
            }

            try {
                const data = await sfetch(`/functions/v1/create-pix`, 'POST', { prize_id: state.prizeId });
                state.roundId = data.round_id;
                
                btn.classList.add('hidden');
                document.getElementById('pix-area').classList.remove('hidden');
                
                document.getElementById('qr-container').innerHTML = '';
                new QRCode(document.getElementById('qr-container'), { text: data.qr_code, width: 150, height: 150 });

                if (data.qr_code.startsWith('MOCK')) {
                    const mockBtn = document.createElement('button');
                    mockBtn.className = 'btn-green';
                    mockBtn.innerText = 'Simular Pagamento (Teste)';
                    mockBtn.onclick = async () => {
                        mockBtn.innerText = 'Simulando...'; mockBtn.disabled = true;
                        // Chama o webhook
                        await sfetch(`/functions/v1/mp-webhook?topic=payment&external_reference=${state.roundId}`, 'POST');
                        startRoulette();
                    };
                    document.getElementById('pix-area').appendChild(mockBtn);
                }

                // Polling simplificado para verificar se foi pago (para Pix Real)
                if(!data.qr_code.startsWith('MOCK')) {
                    setInterval(async () => {
                        try {
                            const rounds = await sfetch(`/rest/v1/rounds?id=eq.${state.roundId}&select=status`);
                            if(rounds && rounds[0] && rounds[0].status === 'paid') {
                                startRoulette();
                            }
                        } catch(e){}
                    }, 3000);
                }

            } catch(e) {
                alert(e.message);
                btn.disabled = false; btn.innerText = "Tentar Novamente";
            }
        }

        function startRoulette() {
            document.getElementById('step-pay').classList.add('hidden');
            document.getElementById('step-spin').classList.remove('hidden');
            
            document.getElementById('roleta-text-display').innerText = state.prizeName || "ROLETA";

            const btnGirar = document.getElementById('btn-girar');
            btnGirar.disabled = false;
            btnGirar.innerText = "GIRAR A ROLETA";
        }

        async function spinRoulette() {
            const btn = document.getElementById('btn-girar');
            btn.disabled = true;
            btn.innerText = "Sorteando...";

            try {
                let prizeResult = "NADA";
                if (BAR_ID === 'simulacao-123') {
                    // Modo simulação: sorteia entre perder e ganhar o prêmio apostado
                    prizeResult = Math.random() > 0.5 ? state.prizeName : 'NADA';
                } else {
                    const data = await sfetch(`/functions/v1/spin-roulette`, 'POST', { round_id: state.roundId });
                    prizeResult = data.prize;
                }
                
                // Animação CSS 
                const wheel = document.getElementById('wheel');
                wheel.style.transform = `rotate(${360 * 10}deg)`; // Apenas um giro visual fixo para simplificar
                
                // Efeitos Sonoros e Vibração
                if (!window.audioCtx) {
                    window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (window.audioCtx.state === 'suspended') window.audioCtx.resume();
                
                function playTick() {
                    if (!window.audioCtx) return;
                    const osc = window.audioCtx.createOscillator();
                    const gainNode = window.audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, window.audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, window.audioCtx.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(0.5, window.audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.05);
                    osc.connect(gainNode);
                    gainNode.connect(window.audioCtx.destination);
                    osc.start();
                    osc.stop(window.audioCtx.currentTime + 0.05);
                }

                let elapsed = 0;
                const totalDuration = 4000;
                const startInterval = 50;
                const endInterval = 400;
                
                function nextTick() {
                    playTick();
                    if (navigator.vibrate) navigator.vibrate(20);
                    
                    let progress = elapsed / totalDuration;
                    let currentInterval = startInterval + (endInterval - startInterval) * Math.pow(progress, 2);
                    
                    elapsed += currentInterval;
                    if (elapsed < totalDuration) {
                        setTimeout(nextTick, currentInterval);
                    }
                }
                nextTick();

                setTimeout(() => {
                    document.getElementById('step-spin').classList.add('hidden');
                    document.getElementById('step-result').classList.remove('hidden');
                    
                    if(prizeResult === 'NADA' || prizeResult === 'GIRE +1') {
                        document.getElementById('result-title').innerText = "Que pena!";
                        document.getElementById('result-title').style.color = "#ef4444";
                        document.getElementById('result-desc').innerText = "Não foi dessa vez.";
                    } else {
                        document.getElementById('result-title').innerText = "Parabéns!";
                        document.getElementById('result-desc').innerText = `Você ganhou: ${prizeResult}. Mostre este QR ao garçom.`;
                        document.getElementById('result-qr-container').classList.remove('hidden');
                        document.getElementById('result-qr-container').innerHTML = '';
                        new QRCode(document.getElementById('result-qr-container'), { text: `REDEEM:${state.roundId}`, width: 150, height: 150 });
                    }
                }, 4000);

            } catch(e) {
                alert(e.message);
            }
        }

        // Inicia a aplicação
        window.onload = init;
    </script>
</body>
</html>
