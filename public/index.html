<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roleta Gelada</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }
        h1 { color: #38bdf8; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-top: 0; margin-bottom: 20px; }
        
        .prize-card {
            background: #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .prize-card:hover { background: #475569; }
        .prize-name { font-weight: bold; font-size: 18px; margin: 0; text-align: left; }
        .prize-price { color: #38bdf8; font-weight: bold; font-size: 16px; margin: 0; }
        
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-blue { background: #2563eb; color: white; }
        .btn-green { background: #16a34a; color: white; margin-top: 20px; }
        
        .hidden { display: none !important; }
        #qr-container { display: flex; justify-content: center; margin: 20px 0; background: white; padding: 10px; border-radius: 10px; width: fit-content; margin-left: auto; margin-right: auto; }
        
        /* Roleta Simples */
        .roleta-box { position: relative; margin: 30px auto; width: 250px; height: 250px; }
        .roleta-pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ef4444; z-index: 10;
        }
        .roleta-wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 5px solid #FFD700;
            background: conic-gradient(#111 0% 16.6%, #FFD700 16.6% 33.3%, #111 33.3% 50%, #FFD700 50% 66.6%, #111 66.6% 83.3%, #FFD700 83.3% 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .roleta-text-center { font-weight: bold; font-size: 14px; color: #FFF; text-align: center; width: 90%; line-height: 1.2; z-index: 20; }
        .roleta-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 110px; height: 110px; background: #1e293b; border: 4px solid #38bdf8;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.8); z-index: 15;
        }
        .slice-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        .slice-text { position: absolute; top: 15px; left: 0; right: 0; text-align: center; font-size: 16px; font-weight: 900; }
        .text-white { color: white; text-shadow: 1px 1px 2px black; }
        .text-black { color: black; }
        
        .error-msg { color: #ef4444; font-weight: bold; padding: 10px; border: 1px solid #ef4444; border-radius: 5px; background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="text-center mb-8 flex flex-col items-center">
            <img id="bar-logo" src="" alt="Logo" class="h-24 mb-4 hidden rounded-xl shadow-lg object-contain">
            <h1 id="bar-name" class="text-3xl font-black text-white">Carregando...</h1>
            <p class="text-xs text-gray-500 mt-2 font-medium tracking-wider uppercase">Powered by Roleta Gelada</p>
        </header>

        <!-- Etapa 1: Lista -->
        <div id="step-list">
            <h2 style="font-size:18px; margin-bottom: 20px;">Escolha o Prêmio</h2>
            <div id="prizes-container">
                <p style="color:#94a3b8;">Buscando...</p>
            </div>
        </div>

        <!-- Etapa 2: Pagar -->
        <div id="step-pay" class="hidden">
            <h2 style="font-size:22px; margin-bottom: 5px;">Aposta: R$ <span id="lbl-bet">0.00</span></h2>
            <p style="color:#94a3b8; margin-top:0;">Concorrendo a: <span id="lbl-prize"></span></p>
            
            <button class="btn-blue" id="btn-gerar-pix" onclick="generatePix()">Pagar com Pix</button>
            
            <div id="pix-area" class="hidden">
                <p style="color:#facc15; font-size: 14px; margin-top: 15px;">Aguardando pagamento...</p>
                <div id="qr-container"></div>
            </div>
        </div>

        <!-- Etapa 3: Roleta -->
        <div id="step-spin" class="hidden">
            <div class="roleta-box">
                <div class="roleta-pointer"></div>
                <div class="roleta-wheel" id="wheel">
                    <div class="slice-wrapper" style="transform: rotate(30deg)"><div id="slice-30" class="slice-text text-white">NADA</div></div>
                    <div class="slice-wrapper" style="transform: rotate(90deg)"><div class="slice-text text-black font-black">GANHOU!</div></div>
                    <div class="slice-wrapper" style="transform: rotate(150deg)"><div id="slice-150" class="slice-text text-white">QUASE</div></div>
                    <div class="slice-wrapper" style="transform: rotate(210deg)"><div id="slice-210" class="slice-text text-black">NADA</div></div>
                    <div class="slice-wrapper" style="transform: rotate(270deg)"><div id="slice-270" class="slice-text text-white">IHHH</div></div>
                    <div class="slice-wrapper" style="transform: rotate(330deg)"><div id="slice-330" class="slice-text text-black">QUASE</div></div>
                    
                    <div class="roleta-center">
                        <span class="roleta-text-center" id="roleta-text-display">ROTAÇÃO</span>
                    </div>
                </div>
            </div>
            <button class="btn-blue" id="btn-girar" onclick="beginSpin()" disabled>GIRAR A ROLETA</button>
        </div>

        <!-- Etapa 4: Resultado -->
        <div id="step-result" class="hidden">
            <h2 id="result-title" style="font-size: 28px; color: #4ade80;">Parabéns!</h2>
            <p id="result-desc" style="color:#94a3b8;">Mostre este código no balcão.</p>
            <div id="result-qr-container" class="hidden mt-4 mb-4 bg-white p-4 rounded-xl inline-block mx-auto"></div>
            <p id="result-shortcode" style="color:#38bdf8; font-weight:bold; font-size:18px; letter-spacing:3px; margin-bottom:15px;"></p>
            <button class="btn-blue mt-4" id="btn-play-again" onclick="location.reload()">Jogar Novamente</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vjupsdakdxexxcdkqfzf.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqdXBzZGFrZHhleHhjZGtxZnpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjY2NDYsImV4cCI6MjA5NTI0MjY0Nn0.5XKPuhn34s-EUf6NXqNwpZysQoJVsyBIHQeVg4wnyyo';
        
        const params = new URLSearchParams(window.location.search);
        const BAR_ID = params.get('bar');

        let state = { prizeId: null, prizeName: null, roundId: null, prizeBet: 0, finalMinorPrize: null, sliceMap: {} };
        let spinState = { isSpinning: false, currentRotation: 0, speed: 5, animFrame: null, timer: 10, timerInterval: null, direction: 1 };

        async function sfetch(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json' }
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(`${SUPABASE_URL}${endpoint}`, options);
            if (!res.ok) {
                const err = await res.text();
                throw new Error(`Erro API: ${err || res.status}`);
            }
            const text = await res.text();
            try { return JSON.parse(text); } catch(e) { return text; }
        }

        function applyTheme(color, bg, logoUrl) {
            if (color) {
                const style = document.createElement('style');
                style.innerHTML = `
                    .bg-blue-600 { background-color: ${color} !important; }
                    .btn-blue { background-color: ${color} !important; }
                    .hover\\:bg-blue-500:hover { background-color: ${color} !important; opacity: 0.8; }
                    .text-cyan-400 { color: ${color} !important; }
                    .text-blue-500 { color: ${color} !important; }
                    h1 { color: ${color} !important; }
                `;
                document.head.appendChild(style);
            }
            if (bg) {
                if (bg.startsWith('http')) {
                    document.body.style.backgroundImage = `url('${bg}')`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundAttachment = 'fixed';
                } else {
                    document.body.style.backgroundColor = bg;
                }
            }
            if (logoUrl && logoUrl.startsWith('http')) {
                const logoEl = document.getElementById('bar-logo');
                logoEl.src = logoUrl;
                logoEl.classList.remove('hidden');
                document.getElementById('bar-name').classList.remove('text-3xl');
                document.getElementById('bar-name').classList.add('text-xl', 'text-gray-300');
            }
        }

        async function init() {
            const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
            
            if (!BAR_ID || !uuidRegex.test(BAR_ID)) {
                document.getElementById('bar-name').innerText = "Link de Bar Inválido ou Desatualizado";
                document.getElementById('step-list').innerHTML = "<p class='text-center text-red-500 font-bold mt-10'>Você está usando um link antigo (modo simulação).<br><br>Peça ao dono do bar para gerar um NOVO LINK no painel dele.</p>";
                return;
            }
            try {
                let prizes = [];
                let minorPrizes = ["Amendoim", "Shot de Cachaça", "IHHH", "GIRE +1", "NADA"];

                const bars = await sfetch(`/rest/v1/bars?id=eq.${BAR_ID}&select=name,minor_prizes,consolation_fee,theme_color,theme_background,theme_logo_url`);
                if(bars && bars.length > 0) {
                    const bar = bars[0];
                    document.getElementById('bar-name').innerText = bar.name;
                    if(bar.minor_prizes) minorPrizes = bar.minor_prizes.split(',').map(s => s.trim());
                    window.CONSOLATION_FEE = parseFloat(bar.consolation_fee) || 0;
                    applyTheme(bar.theme_color, bar.theme_background, bar.theme_logo_url);
                } else {
                    document.getElementById('bar-name').innerText = "Bar não encontrado.";
                    document.getElementById('step-list').innerHTML = "<p class='text-center text-red-500 font-bold mt-10'>Bar inativo ou inexistente no banco de dados.</p>";
                    return;
                }

                // Busca prêmios reais
                prizes = await sfetch(`/rest/v1/prizes?bar_id=eq.${BAR_ID}&active=eq.true&select=*`);

                // Injeta prêmios menores na roleta
                const losingAngles = [30, 150, 210, 270, 330];
                const targetRotations = [330, 210, 150, 90, 30];
                let minorIndex = 0;
                losingAngles.forEach((angle, i) => {
                    const mp = minorPrizes[minorIndex % minorPrizes.length];
                    const el = document.getElementById(`slice-${angle}`);
                    if (el) el.innerText = mp;
                    state.sliceMap[targetRotations[i]] = mp;
                    minorIndex++;
                });
                
                const container = document.getElementById('prizes-container');
                container.innerHTML = '';

                if (!prizes || prizes.length === 0) {
                    container.innerHTML = '<p>Nenhum prêmio disponível.</p>';
                    return;
                }
                window.loadedPrizes = prizes;

                prizes.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'prize-card';
                    
                    div.innerHTML = `
                        <div><p class="prize-name">${p.name}</p></div>
                        <div><p class="prize-price">R$ ${p.bet_amount.toFixed(2)}</p></div>
                    `;
                    div.onclick = () => selectPrize(p.id, p.name, p.bet_amount);
                    container.appendChild(div);
                });

            } catch(e) {
                document.getElementById('prizes-container').innerHTML = `<p class="error-msg">${e.message}</p>`;
            }
        }

        function selectPrize(id, name, bet) {
            state.prizeId = id;
            state.prizeName = name;
            state.prizeBet = bet; // Cliente paga o valor base exato
            
            document.getElementById('step-list').classList.add('hidden');
            document.getElementById('step-pay').classList.remove('hidden');
            document.getElementById('lbl-prize').innerText = name;
            document.getElementById('lbl-bet').innerText = state.prizeBet.toFixed(2);
        }

        async function generatePix() {
            const btn = document.getElementById('btn-gerar-pix');
            btn.disabled = true; btn.innerText = "Gerando...";

            try {
                const data = await sfetch(`/functions/v1/create-pix`, 'POST', { prize_id: state.prizeId });
                state.roundId = data.round_id;
                
                btn.classList.add('hidden');
                document.getElementById('pix-area').classList.remove('hidden');
                
                document.getElementById('qr-container').innerHTML = '';
                new QRCode(document.getElementById('qr-container'), { text: data.qr_code, width: 150, height: 150 });

                if (data.qr_code.startsWith('MOCK')) {
                    const mockBtn = document.createElement('button');
                    mockBtn.className = 'btn-green';
                    mockBtn.innerText = 'Simular Pagamento (Teste)';
                    mockBtn.onclick = async () => {
                        mockBtn.innerText = 'Simulando...'; mockBtn.disabled = true;
                        // Chama o webhook
                        await sfetch(`/functions/v1/mp-webhook?topic=payment&external_reference=${state.roundId}`, 'POST');
                        startRoulette();
                    };
                    document.getElementById('pix-area').appendChild(mockBtn);
                }

                // Polling simplificado para verificar se foi pago (para Pix Real)
                if(!data.qr_code.startsWith('MOCK')) {
                    setInterval(async () => {
                        try {
                            const rounds = await sfetch(`/rest/v1/rounds?id=eq.${state.roundId}&select=status`);
                            if(rounds && rounds[0] && rounds[0].status === 'paid') {
                                startRoulette();
                            }
                        } catch(e){}
                    }, 3000);
                }

            } catch(e) {
                alert(e.message);
                btn.disabled = false; btn.innerText = "Tentar Novamente";
            }
        }

        function startRoulette() {
            document.getElementById('step-pay').classList.add('hidden');
            document.getElementById('step-spin').classList.remove('hidden');
            
            document.getElementById('roleta-text-display').innerText = state.prizeName || "ROLETA";

            const btnGirar = document.getElementById('btn-girar');
            btnGirar.disabled = false;
            btnGirar.innerText = "INICIAR";
            btnGirar.onclick = beginSpin;
        }

        async function beginSpin() {
            const btn = document.getElementById('btn-girar');
            btn.disabled = true;
            btn.innerText = "Preparando...";

            try {
                // Obter dificuldade do backend
                const res = await sfetch(`/functions/v1/spin-roulette`, 'POST', { round_id: state.roundId, action: 'start' });
                
                // Define a velocidade (graus por frame a 60fps)
                // easy = lucro já garantido (> 1.5x), velocidade mais justa (6 graus por frame = ~1 volta por segundo)
                // hard = protegendo lucro, velocidade absurda e muito difícil (45 graus por frame = ~0.13s por volta, borrão visual)
                spinState.speed = (res.difficulty === 'easy') ? 6 : 45; 
                spinState.direction = Math.random() > 0.5 ? 1 : -1; // Alterna sentido horário e anti-horário
                
                spinState.timer = 10;
                btn.innerText = `PARAR (${spinState.timer}s)`;
                btn.style.backgroundColor = '#ef4444'; // Vermelho para chamar a atenção
                btn.disabled = false;
                btn.onclick = stopSpin;

                spinState.isSpinning = true;
                
                if (!window.audioCtx) {
                    window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (window.audioCtx.state === 'suspended') window.audioCtx.resume();
                
                animateSpin();

                spinState.timerInterval = setInterval(() => {
                    spinState.timer--;
                    if (spinState.timer > 0) {
                        btn.innerText = `PARAR (${spinState.timer}s)`;
                    } else {
                        clearInterval(spinState.timerInterval);
                        forceTimeout();
                    }
                }, 1000);

            } catch (e) {
                alert("Erro ao iniciar roleta: " + e.message);
                btn.disabled = false;
                btn.innerText = "INICIAR";
            }
        }

        let lastAudioTime = 0;
        function animateSpin() {
            if (!spinState.isSpinning) return;
            
            spinState.currentRotation += (spinState.speed * spinState.direction);
            document.getElementById('wheel').style.transform = `rotate(${spinState.currentRotation}deg)`;
            
            // Efeito sonoro rudimentar baseado na velocidade
            const now = Date.now();
            const tickRate = (spinState.speed > 10) ? 50 : 150;
            if (now - lastAudioTime > tickRate) {
                lastAudioTime = now;
                if (window.audioCtx) {
                    const osc = window.audioCtx.createOscillator();
                    const gainNode = window.audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(800, window.audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, window.audioCtx.currentTime + 0.05);
                    gainNode.gain.setValueAtTime(0.1, window.audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.05);
                    osc.connect(gainNode);
                    gainNode.connect(window.audioCtx.destination);
                    osc.start();
                    osc.stop(window.audioCtx.currentTime + 0.05);
                }
            }

            spinState.animFrame = requestAnimationFrame(animateSpin);
        }

        function getMinorPrizeFromAngle(angle) {
            if (angle >= 0 && angle < 60) return state.sliceMap[30];
            if (angle >= 60 && angle < 120) return state.sliceMap[90];
            if (angle >= 120 && angle < 180) return state.sliceMap[150];
            if (angle >= 180 && angle < 240) return state.sliceMap[210];
            if (angle >= 300 && angle <= 360) return state.sliceMap[330];
            return "NADA"; 
        }

        async function forceTimeout() {
            spinState.isSpinning = false;
            cancelAnimationFrame(spinState.animFrame);
            
            const btn = document.getElementById('btn-girar');
            btn.disabled = true;
            btn.innerText = "Tempo Esgotado!";
            btn.style.backgroundColor = '';
            
            // Força um ângulo de perda absoluta (ex: 0 = "NADA")
            const stoppedAngle = 0; 

            try {
                await sfetch(`/functions/v1/spin-roulette`, 'POST', { round_id: state.roundId, action: 'stop', angle: stoppedAngle });
                
                document.getElementById('step-spin').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
                
                document.getElementById('result-title').innerText = "Tempo Esgotado!";
                document.getElementById('result-title').style.color = "#ef4444";
                document.getElementById('result-desc').innerText = "Você demorou muito para parar e perdeu a rodada.";
                document.getElementById('result-qr-container').classList.add('hidden');
                document.getElementById('result-shortcode').innerText = "";
            } catch (e) {
                alert("Erro ao processar timeout: " + e.message);
            }
        }

        async function stopSpin() {
            if (spinState.timerInterval) clearInterval(spinState.timerInterval);
            spinState.isSpinning = false;
            cancelAnimationFrame(spinState.animFrame);
            
            const btn = document.getElementById('btn-girar');
            btn.disabled = true;
            btn.innerText = "Processando...";
            btn.style.backgroundColor = '';
            
            let stoppedAngle = spinState.currentRotation % 360;
            if (stoppedAngle < 0) stoppedAngle += 360;

            try {
                const data = await sfetch(`/functions/v1/spin-roulette`, 'POST', { round_id: state.roundId, action: 'stop', angle: stoppedAngle });
                
                let prizeResult = data.prize;
                let isWon = data.status === 'WON';

                document.getElementById('step-spin').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
                
                if (!isWon) {
                    const minor = getMinorPrizeFromAngle(stoppedAngle);
                    state.finalMinorPrize = minor;
                    
                    const isNothing = !minor || minor.toUpperCase() === 'NADA' || minor.toUpperCase() === 'IHHH' || minor.toUpperCase() === 'QUASE' || minor.toUpperCase() === 'NÃO FOI DESSA VEZ';
                    const btnPlayAgain = document.getElementById('btn-play-again');
                    
                    const isGireMais1 = minor && (minor.toUpperCase().trim() === 'GIRE +1' || minor.toUpperCase().includes('GIRE'));
                    if (isGireMais1) {
                        document.getElementById('result-title').innerText = "GIRE +1 !";
                        document.getElementById('result-title').style.color = "#38bdf8";
                        document.getElementById('result-desc').innerText = "Você ganhou uma rodada grátis!";
                        document.getElementById('result-qr-container').classList.add('hidden');
                        document.getElementById('result-shortcode').innerText = "";
                        
                        btnPlayAgain.innerText = "Girar Novamente (Grátis!)";
                        btnPlayAgain.onclick = () => {
                            document.getElementById('step-result').classList.add('hidden');
                            document.getElementById('step-spin').classList.remove('hidden');
                            
                            btn.disabled = false;
                            btn.innerText = "INICIAR";
                            btn.onclick = beginSpin;
                            
                            btnPlayAgain.innerText = "Jogar Novamente";
                            btnPlayAgain.onclick = () => location.reload();
                        };
                    } else if (!isNothing) {
                        document.getElementById('result-title').innerText = "Prêmio Menor!";
                        document.getElementById('result-title').style.color = "#facc15";
                        document.getElementById('result-desc').innerText = `Consolação: ${minor}. Mostre no balcão!`;
                        document.getElementById('result-qr-container').classList.remove('hidden');
                        document.getElementById('result-qr-container').innerHTML = '';
                        new QRCode(document.getElementById('result-qr-container'), { 
                            text: `REDEEM_MINOR:${state.roundId}`, 
                            width: 200, 
                            height: 200,
                            colorDark: "#000000",
                            colorLight: "#ffffff",
                            correctLevel: 1 
                        });
                        document.getElementById('result-shortcode').innerText = state.roundId.substring(0, 4).toUpperCase();
                    } else {
                        document.getElementById('result-title').innerText = "Que pena!";
                        document.getElementById('result-title').style.color = "#ef4444";
                        document.getElementById('result-desc').innerText = minor ? minor : "Não foi dessa vez.";
                        document.getElementById('result-qr-container').classList.add('hidden');
                        document.getElementById('result-shortcode').innerText = "";
                    }
                } else {
                    document.getElementById('result-title').innerText = "Parabéns!";
                    document.getElementById('result-desc').innerText = `Você ganhou: ${prizeResult}. Mostre este QR ao garçom.`;
                    document.getElementById('result-qr-container').classList.remove('hidden');
                    document.getElementById('result-qr-container').innerHTML = '';
                    new QRCode(document.getElementById('result-qr-container'), { 
                        text: `REDEEM:${state.roundId}`, 
                        width: 200, 
                        height: 200,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: 1 
                    });
                    document.getElementById('result-shortcode').innerText = state.roundId.substring(0, 4).toUpperCase();
                }

            } catch (e) {
                alert("Erro ao parar: " + e.message);
                btn.disabled = false;
                btn.innerText = "Tentar Novamente";
                btn.onclick = stopSpin;
            }
        }


        // Inicia a aplicação
        window.onload = init;
    </script>
</body>
</html>
